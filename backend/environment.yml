# In backend directory: "conda env create -f environment.yml"
name: uga-ai
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch
  - umap-learn
  - pip
  - pip:
    - Flask==3.0.2
    - Flask-Cors==4.0.0
    - requests==2.31.0
    - beautifulsoup4==4.12.3
    - sentence-transformers==2.5.1
    - pandas==2.2.1
    - scikit-learn==1.4.1.post1
    - google-generativeai>=0.8.3
    - numpy
    - python-dotenv